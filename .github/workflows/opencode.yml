name: OpenCode AI Agent (MiniMax)
on:
  issue_comment:
    types: [created]

jobs:
  opencode-fix:
    if: contains(github.event.comment.body, '/opencode') || contains(github.event.comment.body, '/oc')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install OpenCode
        run: npm install -g opencode-ai

      - name: Run OpenCode Agent
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENCODE_TOKEN: ${{ secrets.OPENCODE_ZEN_API_KEY }}
        run: |
          # Use a simpler way to get the instruction text
          INSTRUCTION="${{ github.event.comment.body }}"
          
          # Strip the trigger words
          CLEAN_MSG=$(echo "$INSTRUCTION" | sed 's/\/oc //g; s/\/opencode //g')

          opencode run "$CLEAN_MSG" --model minimax-m2.5