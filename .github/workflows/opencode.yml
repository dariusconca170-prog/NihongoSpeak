name: OpenCode AI Agent (MiniMax)
on:
  issue_comment:
    types: [created]

jobs:
  opencode-fix:
    if: contains(github.event.comment.body, '/opencode') || contains(github.event.comment.body, '/oc')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install OpenCode
        run: npm install -g opencode-ai

      - name: Run OpenCode Agent
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENCODE_TOKEN: ${{ secrets.OPENCODE_ZEN_API_KEY }}
          # Pass the model and message as env vars to prevent trailing char issues
          OPENCODE_MODEL: "minimax-m2.5"
          USER_PROMPT: ${{ github.event.comment.body }}
        run: |
          # Use the environment variables directly in the command
          # We place the message as a positional argument at the end
          opencode run "$USER_PROMPT" --model "$OPENCODE_MODEL"