name: M2.5-Agent-Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  agent-execution:
    runs-on: ubuntu-latest
    
    env:
      MODEL_ID: "opencode/minimax-m2.5-free"
      API_BASE_URL: "https://api.opencode.ai/v1"
      # ENSURE THIS SECRET IS SET IN YOUR REPO SETTINGS
      API_KEY: ${{ secrets.OPENCODE_API_KEY }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: pip install openai

      - name: Initialize M2.5 Architect
        run: |
          python -c "
          import openai
          import sys

          client = openai.OpenAI(
              api_key='${{ env.API_KEY }}', 
              base_url='${{ env.API_BASE_URL }}'
          )
          
          try:
              # MiniMax M2.5 sometimes prefers lower max_tokens on free tier
              response = client.chat.completions.create(
                  model='${{ env.MODEL_ID }}',
                  messages=[
                      {'role': 'system', 'content': 'You are a senior dev.'},
                      {'role': 'user', 'content': 'Write a hello world in Rust.'}
                  ],
                  temperature=0.1,
                  max_tokens=500 
              )
              
              # THE FIX: Validate the response type before accessing attributes
              if isinstance(response, str):
                  print(f'CRITICAL: API returned a raw string instead of an object: {response}')
                  sys.exit(1)
              
              if hasattr(response, 'choices') and response.choices:
                  print(response.choices[0].message.content)
              else:
                  print(f'Unexpected response structure: {response}')
                  sys.exit(1)

          except Exception as e:
              print(f'SDK Error: {e}')
              sys.exit(1)
          "