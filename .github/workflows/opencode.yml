name: OpenCode AI Agent (MiniMax)
on:
  issue_comment:
    types: [created]

jobs:
  opencode-fix:
    if: contains(github.event.comment.body, '/opencode') || contains(github.event.comment.body, '/oc')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install OpenCode
        run: npm install -g opencode-ai

      - name: Run OpenCode Agent
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # The CLI looks for this specific env variable name for the token
          OPENCODE_TOKEN: ${{ secrets.OPENCODE_ZEN_API_KEY }}
        run: |
          # Clean the comment to remove the trigger word
          INSTRUCTION=$(echo "${{ github.event.comment.body }}" | sed 's/\/oc //g; s/\/opencode //g')
          
          # Run the command using standard positional arguments
          opencode run "$INSTRUCTION" --model "zen/minimax-m2.5-free"