name: M2.5-Agent-Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  agent-execution:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Dependencies
        run: pip install openai>=2.30.0

      - name: Initialize M2.5 Architect
        env:
          MODEL_ID: "minimax-m2.5-free"
          API_KEY: ${{ secrets.OPENCODE_API_KEY }}
        run: |
          cat > run_agent.py << 'EOF'
          import openai, sys, os, re

          model_id = os.environ.get('MODEL_ID', 'NOT SET')
          api_key = os.environ.get('API_KEY', '')

          if not api_key or len(api_key) < 10:
              print('CRITICAL: API_KEY missing or invalid.')
              sys.exit(1)

          client = openai.OpenAI(
              api_key=api_key,
              base_url="https://opencode.ai/zen/v1"
          )

          try:
              # We ask specifically for a structured output to make parsing easier
              response = client.chat.completions.create(
                  model=model_id,
                  messages=[
                      {'role': 'system', 'content': 'You are a senior Rust architect. Always wrap code in triple backticks with the filename in a comment on the first line.'},
                      {'role': 'user', 'content': 'Create a production-ready Hello World. I need Cargo.toml and src/main.rs.'}
                  ],
                  temperature=0.8
              )
              
