name: M2.5-Agent-Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  agent-execution:
    runs-on: ubuntu-latest
    
    env:
      # THE FIX: Use the exact canonical ID for the Zen proxy
      MODEL_ID: "minimax/minimax-m2.5"
      # THE FIX: Use the 'Zen' Gateway URL
      API_BASE_URL: "https://zen.opencode.ai/v1"
      API_KEY: ${{ secrets.OPENCODE_API_KEY }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: pip install openai>=2.30.0

      - name: Initialize M2.5 Architect
        run: |
          python -c "
          import openai
          import sys

          # OpenCode Zen requires the API key to be passed as a Bearer token
          client = openai.OpenAI(
              api_key='${{ env.API_KEY }}', 
              base_url='${{ env.API_BASE_URL }}'
          )
          
          try:
              # MiniMax-M2.5 performs best with a higher temperature (0.9+)
              # and prefers the 'user' role for the initial instruction
              response = client.chat.completions.create(
                  model='${{ env.MODEL_ID }}',
                  messages=[
                      {'role': 'system', 'content': 'You are a senior Rust architect. Plan the project structure first.'},
                      {'role': 'user', 'content': 'Generate a production-ready Hello World in Rust.'}
                  ],
                  temperature=1.0,
                  top_p=0.95
              )
              
              if response and response.choices:
                  print(response.choices[0].message.content)
              else:
                  print(f'Empty response from gateway: {response}')
                  sys.exit(1)

          except Exception as e:
              # This will catch 400/401/404 errors with details
              print(f'SDK Error: {e}')
              sys.exit(1)
          "