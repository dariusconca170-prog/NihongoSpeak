name: M2.5-Agent-Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  agent-execution:
    runs-on: ubuntu-latest
    
    env:
      # EXACT string from your database migration list
      MODEL_ID: "opencode/minimax-m2.5-free"
      # The 2026 production endpoint
      API_BASE_URL: "https://gateway.opencode.ai/v1"
      # FIX: Link this to whatever your Secret is actually named in GitHub
      # If your secret is named 'MY_SECRET', change it to ${{ secrets.MY_SECRET }}
      API_KEY: ${{ secrets.OPENCODE_API_KEY }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: pip install openai>=2.30.0

      - name: Initialize M2.5 Architect
        run: |
          python -c "
          import openai
          import sys
          import os

          # Validation check for the key
          api_key = os.environ.get('API_KEY')
          if not api_key:
              print('CRITICAL: API_KEY is empty. Check your GitHub Secrets name.')
              sys.exit(1)

          client = openai.OpenAI(
              api_key=api_key, 
              base_url='${{ env.API_BASE_URL }}'
          )
          
          try:
              response = client.chat.completions.create(
                  model='${{ env.MODEL_ID }}',
                  messages=[
                      {'role': 'system', 'content': 'You are a senior Rust architect.'},
                      {'role': 'user', 'content': 'Write a production Hello World in Rust.'}
                  ],
                  temperature=0.7 # Stable middle-ground for M2.5
              )
              
              if hasattr(response, 'choices') and response.choices:
                  print(response.choices[0].message.content)
              else:
                  print(f'Proxy returned non-standard response: {response}')
                  sys.exit(1)

          except Exception as e:
              print(f'SDK Error: {e}')
              sys.exit(1)
          "