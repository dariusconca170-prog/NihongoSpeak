name: M2.5-Agent-Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  agent-execution:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: pip install openai>=2.30.0

      - name: Initialize M2.5 Architect
        env:
          MODEL_ID: "minimax-m2.5-free"
          API_KEY: ${{ secrets.OPENCODE_API_KEY }}
        run: |
          cat > run_agent.py << 'EOF'
          import openai, sys, os

          model_id = os.environ.get('MODEL_ID', 'NOT SET')
          api_key = os.environ.get('API_KEY', '')

          print(f"Using model: {model_id}")

          if not api_key or len(api_key) < 10:
              print('CRITICAL: OPENCODE_API_KEY missing or invalid.')
              sys.exit(1)

          client = openai.OpenAI(
              api_key=api_key,
              base_url="https://opencode.ai/zen/v1"
          )

          try:
              response = client.chat.completions.create(
                  model=model_id,
                  messages=[
                      {'role': 'system', 'content': 'You are a senior Rust architect.'},
                      {'role': 'user', 'content': 'Write a production Hello World in Rust.'}
                  ],
                  temperature=0.8
              )
              if hasattr(response, 'choices') and response.choices:
                  print(response.choices[0].message.content)
              else:
                  print(f'Gateway Error: {response}')
                  sys.exit(1)
          except Exception as e:
              print(f'SDK Error: {e}')
              sys.exit(1)
          EOF
          python run_agent.py