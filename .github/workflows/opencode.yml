name: M2.5-Agent-Deploy

on:
  push:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  agent-execution:
    runs-on: ubuntu-latest
    
    env:
      MODEL_ID: "opencode/minimax-m2.5-free"
      API_BASE_URL: "https://api.opencode.ai/v1"
      API_KEY: ${{ secrets.OPENCODE_API_KEY }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Agent Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install openai>=2.0.0

      - name: Initialize M2.5 Architect
        run: |
          python -c "
          import openai
          import sys

          client = openai.OpenAI(
              api_key='${{ env.API_KEY }}', 
              base_url='${{ env.API_BASE_URL }}'
          )
          
          try:
              response = client.chat.completions.create(
                  model='${{ env.MODEL_ID }}',
                  messages=[
                      {'role': 'system', 'content': 'You are the MiniMax-M2.5 Architect.'},
                      {'role': 'user', 'content': 'Analyze the codebase and suggest optimizations.'}
                  ],
                  temperature=0.1
              )
              # In OpenAI v2+, response is an object, not a dict
              print(response.choices[0].message.content)
          except Exception as e:
              print(f'API Error: {e}')
              sys.exit(1)
          "

      - name: Log Execution
        run: echo "Deployment of ${{ env.env.MODEL_ID }} complete."