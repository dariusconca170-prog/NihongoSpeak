name: M2.5-Agent-Deploy

on:
  push:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  agent-execution:
    runs-on: ubuntu-latest
    
    env:
      # The exact model string from your list
      MODEL_ID: "opencode/minimax-m2.5-free"
      # Base URL for the OpenCode/MiniMax provider
      API_BASE_URL: "https://api.opencode.ai/v1"
      API_KEY: ${{ secrets.OPENCODE_API_KEY }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Agent Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Initialize M2.5 Architect
        run: |
          pip install openai  # MiniMax uses OpenAI-compatible SDK
          python -c "
          import openai
          client = openai.OpenAI(api_key='${{ env.API_KEY }}', base_url='${{ env.API_BASE_URL }}')
          
          response = client.chat.completions.create(
              model='${{ env.MODEL_ID }}',
              messages=[
                  {'role': 'system', 'content': 'You are the MiniMax-M2.5 Architect.'},
                  {'role': 'user', 'content': 'Analyze the codebase and suggest optimizations.'}
              ],
              temperature=0.1 # Low temp for precise coding
          )
          print(response.choices[0].message.content)
          "

      - name: Log Execution
        run: echo "Deployment of ${{ env.MODEL_ID }} complete."