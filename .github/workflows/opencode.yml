name: M2.5-Agent-Deploy

on:
  issue_comment:
    types: [created]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  agent-execution:
    if: |
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.event.comment.body, '/oc')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: pip install openai>=2.30.0 --quiet

      - name: Extract Instruction from Comment
        id: extract
        run: |
          if [ "${{ github.event_name }}" = "issue_comment" ]; then
            INSTRUCTION=$(echo '${{ github.event.comment.body }}' | sed 's|^/oc ||')
          else
            INSTRUCTION="Write a production Hello World in Rust."
          fi
          echo "instruction=$INSTRUCTION" >> $GITHUB_OUTPUT

      - name: Run M2.5 Agent
        env:
          MODEL_ID: "minimax-m2.5-free"
          API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          INSTRUCTION: ${{ steps.extract.outputs.instruction }}
        run: |
          cat > /tmp/run_agent.py << 'EOF'
          import openai, sys, os, re, json
          from pathlib import Path

          model_id = os.environ.get('MODEL_ID', 'NOT SET')
          api_key = os.environ.get('API_KEY', '')
          instruction = os.environ.get('INSTRUCTION', '')

          print(f"Using model: {model_id}")
          print(f"Instruction: {instruction}")

          if not api_key or len(api_key) < 10:
              print('CRITICAL: OPENCODE_API_KEY missing or invalid.')
              sys.exit(1)

          repo_context = []
          extensions = {'.py', '.rs', '.ts', '.tsx', '.js', '.jsx', '.go', '.toml', '.json', '.yaml', '.yml', '.md', '.slint'}
          ignore_dirs = {'.git', 'node_modules', '__pycache__', '.venv', 'target', 'dist', 'build'}

          for path in sorted(Path('.').rglob('*')):
              if path.is_file() and path.suffix in extensions:
                  if any(part in ignore_dirs for part in path.parts):
                      continue
                  try:
                      content = path.read_text(encoding='utf-8')
                      repo_context.append(f'### FILE: {path}\n{content}')
                  except Exception:
                      pass

          context_block = '\n\n'.join(repo_context) if repo_context else '(no source files found)'
          print(f"Loaded {len(repo_context)} files into context.")

          system_prompt = (
              'You are a senior software engineer working on an existing codebase.\n'
              'The current repository files are provided below.\n'
              'When asked to fix or change code, return ONLY the files that need to change.\n'
              'Return a raw JSON array with no markdown, no code fences, no explanation.\n'
              'Each item MUST use exactly these two keys: "path" and "content".\n'
              'Example: [{"path": "src/main.rs", "content": "fn main() {}"}]\n'
              'Return the COMPLETE file content for each changed file.\n'
              'Only include files that actually need changes.\n\n'
              f'CURRENT REPOSITORY FILES:\n\n{context_block}'
          )

          client = openai.OpenAI(
              api_key=api_key,
              base_url="https://opencode.ai/zen/v1"
          )

          def clean(text):
              text = text.strip()
              text = re.sub(r'^```[a-z]*\n?', '', text)
              text = re.sub(r'\n?```$', '', text)
              return text.strip()

          def try_parse(text):
              try:
                  result = json.loads(text)
                  if isinstance(result, list):
                      return result
              except json.JSONDecodeError:
                  pass
              return None

          def call_model(messages):
              response = client.chat.completions.create(
                  model=model_id,
                  messages=messages,
                  temperature=0.3
              )
              if hasattr(response, 'choices') and response.choices:
                  return response.choices[0].message.content.strip()
              return None

          messages = [
              {'role': 'system', 'content': system_prompt},
              {'role': 'user', 'content': instruction}
          ]

          print("Attempt 1...")
          raw = call_model(messages)
          if not raw:
              print('ERROR: Model returned empty response.')
              sys.exit(1)

          print(f"Raw output ({len(raw)} chars): {raw[:300]}")
          output = clean(raw)
          parsed = try_parse(output)

          if parsed is None:
              print("Attempt 1 returned prose. Retrying with stricter prompt...")
              messages.append({'role': 'assistant', 'content': raw})
              messages.append({
                  'role': 'user',
                  'content': (
                      'Your response was not valid JSON. '
                      'Respond with ONLY a raw JSON array, nothing else. '
                      'No explanation, no markdown, no code fences. '
                      'Each item must have exactly "path" and "content" keys. '
                      'Start with [ and end with ].'
                  )
              })
              print("Attempt 2...")
              raw2 = call_model(messages)
              if raw2:
                  print(f"Attempt 2 output ({len(raw2)} chars): {raw2[:300]}")
                  output = clean(raw2)
                  parsed = try_parse(output)

          if parsed is None:
              print("Both attempts failed. Saving prose as fallback.")
              with open('/tmp/agent_output.json', 'w') as f:
                  json.dump({"prose": output}, f)
          else:
              # Normalize: accept both "path" and "file" as the path key
              normalized = []
              for item in parsed:
                  p = item.get('path') or item.get('file') or item.get('filename') or item.get('name')
                  c = item.get('content') or item.get('code') or item.get('text') or ''
                  if p:
                      normalized.append({'path': p, 'content': c})
                  else:
                      print(f"WARNING: Could not find path key in item: {list(item.keys())}")
              print(f"Parsed {len(normalized)} file(s) to write.")
              with open('/tmp/agent_output.json', 'w') as f:
                  json.dump(normalized, f)

          print('Agent output saved.')
          EOF
          python /tmp/run_agent.py

      - name: Write Agent Files
        run: |
          python3 << 'EOF'
          import json, os, sys
          from pathlib import Path

          if not os.path.exists('/tmp/agent_output.json'):
              print('No agent output found.')
              sys.exit(0)

          with open('/tmp/agent_output.json') as f:
              data = json.load(f)

          if isinstance(data, dict) and 'prose' in data:
              print('Agent returned prose. Saving as agent_response.md.')
              with open('agent_response.md', 'w') as f:
                  f.write(data['prose'])
              sys.exit(0)

          for item in data:
              path = Path(item['path'])
              content = item['content']
              path.parent.mkdir(parents=True, exist_ok=True)
              path.write_text(content, encoding='utf-8')
              print(f'Wrote: {path}')
          EOF

      - name: Create Branch and Open PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INSTRUCTION: ${{ steps.extract.outputs.instruction }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          BRANCH="agent/run-${{ github.run_number }}"
          git checkout -b "$BRANCH"

          rm -f run_agent.py agent_output.json

          git add -A

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "agent: $INSTRUCTION"
          git push origin "$BRANCH"

          gh pr create \
            --title "Agent: $INSTRUCTION" \
            --body "Automated PR from M2.5 agent run #${{ github.run_number }}

          **Instruction:** $INSTRUCTION

          **Triggered by:** ${{ github.event.comment.html_url }}" \
            --base main \
            --head "$BRANCH"