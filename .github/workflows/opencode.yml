name: M2.5-Agent-Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  agent-execution:
    runs-on: ubuntu-latest
    
    env:
      # Use the specific Free Tier ID from your list
      MODEL_ID: "opencode/minimax-m2.5-free"
      # CORRECT 2026 GATEWAY URL
      API_BASE_URL: "https://gateway.opencode.ai/v1"
      API_KEY: ${{ secrets.OPENCODE_API_KEY }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: pip install openai>=2.0.0

      - name: Initialize M2.5 Architect
        run: |
          python -c "
          import openai
          import sys

          # OpenCode Zen/Free Tier requires the 'opencode/' prefix in the model ID
          client = openai.OpenAI(
              api_key='${{ env.API_KEY }}', 
              base_url='${{ env.API_BASE_URL }}'
          )
          
          try:
              response = client.chat.completions.create(
                  model='${{ env.MODEL_ID }}',
                  messages=[
                      {'role': 'system', 'content': 'You are a senior Rust architect.'},
                      {'role': 'user', 'content': 'Generate a production-ready Hello World in Rust.'}
                  ],
                  temperature=0.1
              )
              
              if hasattr(response, 'choices') and response.choices:
                  print(response.choices[0].message.content)
              else:
                  # If the proxy returns an error string instead of JSON
                  print(f'Proxy Error: {response}')
                  sys.exit(1)

          except Exception as e:
              print(f'Connection Error: {e}')
              sys.exit(1)
          "